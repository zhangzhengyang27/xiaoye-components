name: Feature request
description: 提出新功能建议
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 说明业务背景和要解决的问题，为什么需要这个功能
      placeholder: |
        作为后台管理系统的开发人员，
        我需要 XXX 功能来处理 YYY 场景，
        以便 ZZZ。
    validations:
      required: true
  - type: textarea
    id: api
    attributes:
      label: 期望的 API 设计
      description: 描述你希望的使用方式和 API 设计
      placeholder: |
        ```vue
        <xy-new-component
          v-model="value"
          :options="options"
          @change="handleChange"
        />
        ```
  - type: textarea
    id: reference
    attributes:
      label: 参考组件（可选）
      description: 如有其他组件库的参考，请提供
      placeholder: |
        - Element Plus: https://element-plus.org/
        - Ant Design Vue: https://www.antdv.com/
        - Naive UI: https://www.naiveui.com/
  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的替代方案（可选）
      description: 你是否考虑过其他实现方式，为什么选择了当前的方案
  - type: textarea
    id: additional
    attributes:
      label: 其他补充（可选）
      description: 任何其他相关信息
